name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main
      - uat

jobs:
  lint-title:
    name: Check PR Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Validate conventional commit format
        if: ${{ !startsWith(github.event.pull_request.title, 'Merge') }}
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            ci
            revert
          requireScope: false
